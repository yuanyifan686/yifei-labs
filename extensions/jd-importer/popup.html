<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Yifei Labs JD 导入</title>
    <style>
      body {
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        margin: 0;
        width: 320px;
        color: #18181b;
        background: #fff;
      }
      .wrap {
        padding: 14px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 6px;
      }
      p {
        margin: 0 0 12px;
        font-size: 12px;
        color: #71717a;
        line-height: 1.5;
      }
      label {
        display: block;
        font-size: 11px;
        color: #52525b;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #e4e4e7;
        border-radius: 6px;
        padding: 8px;
        font-size: 12px;
        margin-bottom: 10px;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 6px;
        background: #18181b;
        color: #fff;
        font-size: 12px;
        font-weight: 600;
        padding: 10px;
        cursor: pointer;
      }
      button.secondary {
        background: #fff;
        color: #18181b;
        border: 1px solid #e4e4e7;
        margin-top: 8px;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        margin-top: 10px;
        font-size: 11px;
        color: #52525b;
        min-height: 16px;
      }
      .preview {
        margin-top: 10px;
        max-height: 120px;
        overflow: auto;
        border: 1px solid #e4e4e7;
        border-radius: 6px;
        padding: 8px;
        font-size: 11px;
        white-space: pre-wrap;
        background: #fafafa;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>导入 JD 到 Yifei Labs</h1>
      <p>在 Boss / 智联岗位详情页打开此弹窗，提取后将跳转到本地能力诊断页。</p>
      <label for="baseUrl">Yifei Labs 地址</label>
      <input id="baseUrl" value="http://localhost:3000" />
      <button id="extractBtn">提取当前页 JD</button>
      <button id="openBtn" class="secondary" disabled>打开能力诊断</button>
      <div id="status" class="status"></div>
      <div id="preview" class="preview" hidden></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
