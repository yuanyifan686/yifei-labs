name: Deploy Aliyun

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-aliyun
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5

        env:
          APP_PATH: ${{ secrets.ALIYUN_APP_PATH }}
          APP_PORT: ${{ secrets.ALIYUN_APP_PORT }}
          PM2_NAME: ${{ secrets.ALIYUN_PM2_NAME }}
          DEPLOY_BRANCH: ${{ github.ref_name }}

        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: 22
          command_timeout: 20m
          debug: true
          envs: APP_PATH,APP_PORT,PM2_NAME,DEPLOY_BRANCH

          script: |
            set -euxo pipefail

            echo "==> SSH connected"
            whoami
            hostname

            if [ -z "${APP_PATH:-}" ]; then
              echo "Missing secret: ALIYUN_APP_PATH"
              exit 1
            fi

            APP_PORT="${APP_PORT:-3001}"
            PM2_NAME="${PM2_NAME:-yifei_labs}"
            DEPLOY_BRANCH="${DEPLOY_BRANCH:-main}"

            echo "APP_PATH=$APP_PATH"
            echo "APP_PORT=$APP_PORT"
            echo "PM2_NAME=$PM2_NAME"
            echo "DEPLOY_BRANCH=$DEPLOY_BRANCH"

            export NVM_DIR="$HOME/.nvm"

            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            fi

            export PATH="/usr/local/bin:/usr/bin:$HOME/.local/bin:$PATH"

            echo "==> Check runtime"
            node -v
            npm -v
            git --version
            pm2 -v

            echo "==> Check application directory"
            test -d "$APP_PATH"
            cd "$APP_PATH"

            pwd
            ls -la

            if [ ! -d .git ]; then
              echo "$APP_PATH is not a Git repository"
              exit 1
            fi

            echo "==> Fetch branch: $DEPLOY_BRANCH"
            git fetch origin "$DEPLOY_BRANCH"
            git checkout -B "$DEPLOY_BRANCH" "origin/$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"

            echo "==> Install dependencies"
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            echo "==> Build application"
            export NEXT_TELEMETRY_DISABLED=1
            npm run build

            echo "==> Restart PM2"

            if pm2 describe "$PM2_NAME" >/dev/null 2>&1; then
              PORT="$APP_PORT" NODE_ENV=production \
                pm2 restart "$PM2_NAME" --update-env
            else
              PORT="$APP_PORT" NODE_ENV=production \
                pm2 start npm --name "$PM2_NAME" -- start
            fi

            pm2 save

            echo "==> Health check"
            sleep 3
            pm2 status "$PM2_NAME"
            curl --fail --silent --show-error \
              "http://127.0.0.1:$APP_PORT" >/dev/null

            echo "==> Deploy completed successfully"