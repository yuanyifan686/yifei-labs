# 推送到 main/master 后，经 SSH 在阿里云服务器上 pull + build + pm2 重启
# 配置步骤见 docs/DEPLOY_ALIYUN_GITHUB.md
name: Deploy Aliyun

on:
  push:
    branches: [main, master]
  workflow_dispatch: # 允许在 GitHub 网页上手动点「Run workflow」

concurrency:
  group: deploy-aliyun
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_PATH: ${{ secrets.ALIYUN_APP_PATH }}
          APP_PORT: ${{ secrets.ALIYUN_APP_PORT }}
          PM2_NAME: ${{ secrets.ALIYUN_PM2_NAME }}
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_SSH_PORT }}
          command_timeout: 20m
          script_stop: true
          envs: APP_PATH,APP_PORT,PM2_NAME
          script: |
            set -euo pipefail
            if [ -z "${APP_PATH:-}" ]; then
              echo "Missing secret ALIYUN_APP_PATH"
              exit 1
            fi
            APP_PORT="${APP_PORT:-3001}"
            PM2_NAME="${PM2_NAME:-yifei-labs}"

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="/usr/local/bin:/usr/bin:$HOME/.local/bin:$PATH"

            cd "$APP_PATH"

            echo "==> git pull"
            git fetch origin
            if git rev-parse --verify origin/master >/dev/null 2>&1; then
              git checkout master
              git reset --hard origin/master
            else
              git checkout main
              git reset --hard origin/main
            fi

            echo "==> install & build"
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            export NEXT_TELEMETRY_DISABLED=1
            npm run build

            echo "==> restart pm2 ($PM2_NAME) on port $APP_PORT"
            if command -v pm2 >/dev/null 2>&1; then
              if pm2 describe "$PM2_NAME" >/dev/null 2>&1; then
                PORT="$APP_PORT" pm2 restart "$PM2_NAME" --update-env
              else
                PORT="$APP_PORT" pm2 start npm --name "$PM2_NAME" -- start
              fi
              pm2 save
            else
              echo "pm2 not found; start manually: PORT=$APP_PORT npm start"
              exit 1
            fi

            echo "==> deploy ok"
            pm2 status "$PM2_NAME" || true
