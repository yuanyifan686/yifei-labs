name: Deploy Aliyun

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

concurrency:
  group: deploy-aliyun
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5

        env:
          APP_PATH: ${{ secrets.ALIYUN_APP_PATH }}
          APP_PORT: ${{ secrets.ALIYUN_APP_PORT }}
          PM2_NAME: ${{ secrets.ALIYUN_PM2_NAME }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}

        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: 22
          command_timeout: 20m
          envs: APP_PATH,APP_PORT,PM2_NAME,DEPLOY_BRANCH,MINIMAX_API_KEY,MINIMAX_BASE_URL,AI_MODEL

          script: |
            set -euxo pipefail

            echo "==> SSH connected"
            whoami
            hostname

            APP_PORT="${APP_PORT:-3001}"
            PM2_NAME="${PM2_NAME:-yifei_labs}"
            DEPLOY_BRANCH="${DEPLOY_BRANCH:-main}"
            MINIMAX_BASE_URL="${MINIMAX_BASE_URL:-https://api.minimaxi.com/v1}"
            AI_MODEL="${AI_MODEL:-MiniMax-M3}"

            if [ -z "${APP_PATH:-}" ]; then
              echo "Missing secret: ALIYUN_APP_PATH"
              exit 1
            fi

            if [ -z "${MINIMAX_API_KEY:-}" ]; then
              echo "Missing secret: MINIMAX_API_KEY"
              exit 1
            fi

            export PATH="/usr/local/bin:/usr/bin:$HOME/.local/bin:$PATH"

            echo "==> Runtime versions"
            node -v
            npm -v
            git --version
            pm2 -v

            echo "==> Enter project directory"
            cd "$APP_PATH"

            if [ ! -d ".git" ]; then
              echo "$APP_PATH is not a Git repository"
              exit 1
            fi

            echo "==> Pull branch: $DEPLOY_BRANCH"
            git fetch origin "$DEPLOY_BRANCH"
            git checkout -B "$DEPLOY_BRANCH" "origin/$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"

            echo "==> Install dependencies"
            npm config set registry https://registry.npmmirror.com

            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            echo "==> Write server environment"
            set +x
            ENV_FILE=".env.local"
            TMP_ENV="$(mktemp)"
            if [ -f "$ENV_FILE" ]; then
              awk '
                /# BEGIN GITHUB_ACTIONS_AI_ENV/ { skip=1; next }
                /# END GITHUB_ACTIONS_AI_ENV/ { skip=0; next }
                skip != 1 { print }
              ' "$ENV_FILE" > "$TMP_ENV"
            else
              : > "$TMP_ENV"
            fi

            cat >> "$TMP_ENV" <<EOF
# BEGIN GITHUB_ACTIONS_AI_ENV
MINIMAX_API_KEY=$MINIMAX_API_KEY
MINIMAX_BASE_URL=$MINIMAX_BASE_URL
AI_MODEL=$AI_MODEL
# END GITHUB_ACTIONS_AI_ENV
EOF
            mv "$TMP_ENV" "$ENV_FILE"
            chmod 600 "$ENV_FILE"
            set -x

            echo "==> Build application"
            export NEXT_TELEMETRY_DISABLED=1
            npm run build

            echo "==> Start or restart PM2"

            if pm2 describe "$PM2_NAME" >/dev/null 2>&1; then
              PORT="$APP_PORT" NODE_ENV=production \
                pm2 restart "$PM2_NAME" --update-env
            else
              PORT="$APP_PORT" NODE_ENV=production \
                pm2 start npm --name "$PM2_NAME" -- start
            fi

            pm2 save

            echo "==> Wait for application"
            sleep 5

            echo "==> PM2 status"
            pm2 status "$PM2_NAME"

            echo "==> Health check"
            curl --fail --silent --show-error \
              "http://127.0.0.1:$APP_PORT" >/dev/null

            echo "==> Deploy completed successfully"
