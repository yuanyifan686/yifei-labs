name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Offline smoke
        run: npm run smoke
      - name: Build
        run: npm run build
        env:
          # Build without real secrets; app must degrade gracefully
          NEXT_TELEMETRY_DISABLED: "1"
